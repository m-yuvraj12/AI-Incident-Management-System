version: '3'

services:

 frontend:

   build: ./frontend

   ports:
    - "3000:3000"

 backend:

   build: ./backend

   ports:
    - "8080:8080"

   depends_on:
    - postgres

 postgres:

   image: postgres:15

   environment:

    POSTGRES_DB: incidentdb

    POSTGRES_USER: admin

    POSTGRES_PASSWORD: password

   ports:

    - "5432:5432"